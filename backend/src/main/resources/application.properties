# ============================================
#  GitCanvas — Spring Boot Configuration
# ============================================
# API keys are read from environment variables.
# For local development, create application-local.properties
# in this same directory (it's gitignored) and set your keys there.
# See ../../.env.example for the required variables.

server.port=8080

# GitHub Personal Access Token
github.api.token=${GITHUB_TOKEN:}

# Gemini API Key
gemini.api.key=${GEMINI_API_KEY:}

# Include local overrides if present (gitignored file for actual keys)
spring.profiles.include=local
spring.config.import=optional:classpath:application-local.properties
